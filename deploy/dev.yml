## Local development — data services only
##
## Starts PostgreSQL, Redis, and MinIO on localhost so you can run
## the Django API, SvelteKit UI, and CRDT server directly on your machine
## (with hot-reload) without installing these services natively.
##
## Usage (normally via scripts/dev-setup.sh or make setup):
##   docker compose -f deploy/dev.yml up -d
##   docker compose -f deploy/dev.yml down
##
## Host ports default to standard values but can be overridden if the
## defaults are taken by other services on your machine:
##   PG_HOST_PORT=5433 MINIO_HOST_PORT=9002 docker compose -f deploy/dev.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: papadam
      POSTGRES_USER: papadam
      POSTGRES_PASSWORD: devpassword
    ports:
      - "${PG_HOST_PORT:-5432}:5432"
    volumes:
      - dev-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "papadam"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"

  minio:
    image: quay.io/minio/minio:RELEASE.2024-11-07T00-52-20Z
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_HOST_PORT:-9000}:9000"          # S3 API
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"  # MinIO web console
    volumes:
      - dev-minio-data:/data

  minio-init:
    image: quay.io/minio/mc:RELEASE.2024-11-17T19-35-25Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 3 &&
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/papadam &&
        mc anonymous set public local/papadam &&
        echo bucket_ready
      "

volumes:
  dev-pg-data:
  dev-minio-data:
