# papadam — Portainer stack (web editor, no env_file)
#
# All images are public on ghcr.io — no registry credentials needed.
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │  HOW TO DEPLOY WITH PORTAINER                                      │
# │                                                                     │
# │  1. Stacks → Add stack → "Web editor"                              │
# │     • Paste this file's contents                                    │
# │                                                                     │
# │  2. Add environment variables (below the editor):                   │
# │     • DJANGO_SECRET_KEY    (required — see generation command)      │
# │     • POSTGRES_PASSWORD    (required)                               │
# │     • MINIO_ROOT_USER     (required)                                │
# │     • MINIO_ROOT_PASSWORD  (required, min 8 chars)                  │
# │     • INTERNAL_SERVICE_KEY (required)                               │
# │     • CRDT_SERVER_TOKEN    (required)                               │
# │     • PUBLIC_API_URL       (required, e.g. https://your.domain)     │
# │     • PUBLIC_CRDT_URL      (required, e.g. wss://your.domain/ws)   │
# │     • ADMIN_PASSWORD       (required)                               │
# │     • IMAGE_TAG            (optional, defaults to "latest")         │
# │     • SENTRY_KEY           (optional, leave blank to disable)       │
# │                                                                     │
# │  3. Deploy the stack                                                │
# │                                                                     │
# │  To update: Stacks → your stack → "Pull and redeploy"              │
# │                                                                     │
# │  Generate secrets:                                                  │
# │    DJANGO_SECRET_KEY:    python -c "import secrets; print(          │
# │                            secrets.token_hex(50))"                  │
# │    POSTGRES_PASSWORD:    openssl rand -base64 32                    │
# │    INTERNAL_SERVICE_KEY: python -c "import secrets; print(          │
# │                            secrets.token_hex(32))"                  │
# │    CRDT_SERVER_TOKEN:    python -c "import secrets; print(          │
# │                            secrets.token_hex(32))"                  │
# └─────────────────────────────────────────────────────────────────────┘
#
# Profiles (enable in Portainer's stack config or via CLI):
#   (none)         — postgres, redis, api, bg-app, crdt, ui
#   minio          — MinIO object storage + auto bucket init
#   docs           — MkDocs documentation site
#   backup         — automated daily PostgreSQL backups

# ── Shared environment blocks ────────────────────────────────────────

x-db-env: &db-env
  DB_URL: postgres://papadam:${POSTGRES_PASSWORD}@postgres:5432/papadam
  REDIS_URL: redis://redis:6379/0

x-minio-env: &minio-env
  PAPAD_FILE_STORAGE_TYPE: minio
  PAPAD_STORAGE_BUCKET_NAME: papadam
  MINIO_ROOT_USER: ${MINIO_ROOT_USER}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
  MINIO_S3_ENDPOINT_URL: http://minio:9000

x-django-env: &django-env
  DJANGO_APP_ENV: production
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
  DJANGO_PAGINATION_LIMIT: 50
  PORT: 8000
  INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
  PUBLIC_API_URL: ${PUBLIC_API_URL}
  PUBLIC_CRDT_URL: ${PUBLIC_CRDT_URL}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD}
  SENTRY_KEY: ${SENTRY_KEY:-}

x-api-base: &api-base
  image: ghcr.io/micahchoo/papadam/api:${IMAGE_TAG:-latest}
  environment:
    <<: [*django-env, *db-env, *minio-env]
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:

  # ── Data ──────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: papadam
      POSTGRES_USER: papadam
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "papadam"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: quay.io/minio/minio:RELEASE.2024-11-07T00-52-20Z
    profiles: [minio]
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || wget -qO- http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  minio-init:
    image: quay.io/minio/mc:RELEASE.2024-11-17T19-35-25Z
    profiles: [minio]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/papadam &&
        mc anonymous set public local/papadam &&
        echo bucket_ready
      "

  # ── Application ───────────────────────────────────────────────────────

  api:
    <<: *api-base
    container_name: papadam-api
    restart: unless-stopped
    command: bash startup.sh
    networks:
      - default
      - nginx_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthcheck/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  bg-app:
    <<: *api-base
    restart: unless-stopped
    command: python -m arq papadapi.worker.WorkerSettings
    healthcheck:
      test: ["CMD", "python", "-c", "import arq; print('ok')"]
      interval: 60s
      timeout: 10s
      retries: 3

  crdt:
    image: ghcr.io/micahchoo/papadam/crdt:${IMAGE_TAG:-latest}
    container_name: papadam-crdt
    restart: unless-stopped
    environment:
      CRDT_API_URL: http://api:8000
      CRDT_SERVER_TOKEN: ${CRDT_SERVER_TOKEN}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - nginx_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:1234/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  ui:
    image: ghcr.io/micahchoo/papadam/ui:${IMAGE_TAG:-latest}
    container_name: papadam-ui
    restart: unless-stopped
    networks:
      - default
      - nginx_network
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Optional profiles ─────────────────────────────────────────────────

  docs:
    image: ghcr.io/micahchoo/papadam/docs:${IMAGE_TAG:-latest}
    profiles: [docs]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/ || wget -qO- http://localhost:8001/"]
      interval: 30s
      timeout: 5s
      retries: 3

  backup:
    image: prodrigestivill/postgres-backup-local:16
    profiles: [backup]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: papadam
      POSTGRES_USER: papadam
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - ./backups:/backups

volumes:
  pg-data:
  redis-data:
  minio-data:

networks:
  default:
  nginx_network:
    external: true
