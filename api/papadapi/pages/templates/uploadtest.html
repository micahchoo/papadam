{% extends '_base.html' %}


{% block content  %}

<!-- check console after uploading files -->
<div x-data="assetsDropzoneData">
  AlpineJS
  <input type="file" multiple="multiple" @change="handleAssetsChange($event)" />
  <br />
  <div>
    <span id="ProgressLabel" class="sr-only">Loading</span>
  
    <span
      role="progressbar"
      aria-labelledby="ProgressLabel"
      x-bind:aria-valuenow="progress"
      class="block rounded-full bg-gray-200"
    >
      <span class="block h-4 rounded-full bg-indigo-600 text-center text-[10px]/4" x-bind:style='`width:${progress}%`'>
        <span class="font-bold text-white" x-text="progress"></span>%
      </span>
    </span>
  </div>
  
</div>

<script>
    var route = "http://localhost:8000/api/v1/archive/";
    
    function assetsDropzoneData() {
      return {progress: 0, handleAssetsChange(e) {
          
          var self = this;
          var files = e.target.files;
          if (files && files.length) {
            var data = new FormData();
              data.append("upload", files[0]);
              data.append("group", "1");
              data.append("name","Test media")
              data.append("description","Description media")
              data.append("tags","")

            axios({
              method: 'POST',
              url: route,
              data: data,
              headers: {
                'Content-Type': 'multipart/form-data;',
                  'Authorization': 'Token 25458361db4b71dc94087605a814e493bcfa17a8'
              },
              onUploadProgress: function(progressEvent) {
                  var percentCompleted = Math.round( (progressEvent.loaded * 100) / progressEvent.total );
                  self.progress = percentCompleted
              }
            }).then(function (res) {
                console.log(res);
              })
              .catch(function (err) {
                console.log(err);
              });

          }
        }
      };
    }
    function alpine_init() {
      Alpine.data("assetsDropzoneData", assetsDropzoneData);
    }
    document.addEventListener("alpine:init", alpine_init);
    
    
</script>

{% endblock content  %}
