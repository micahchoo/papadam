{% extends '_base.html' %}
{% load static %}

{% block static %}
  <script src="{% static 'js/resetpassword.js' %}"></script>
{% endblock static %}



{% block content %}
<div x-data="passwordReset()" class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md bg-white p-8 rounded shadow-md">
        <h1 class="text-2xl font-semibold mb-4">Reset Password</h1>
        
        <template x-if="!linkSent">
            <div>
                <div class="mb-4">
                    <label for="email" class="block text-sm font-medium text-gray-600">Email</label>
                    <input type="email" id="email" x-model="userEmail" class="mt-1 p-2 w-full border rounded">
                </div>
                <button @click="requestReset" class="bg-blue-500 text-white px-4 py-2 rounded">Send Reset Link</button>
            </div>
        </template>

        <template x-if="linkSent">
            <div class="text-center mt-4">
                <p>If an account with that email exists, we have sent an email with password reset instructions to the administrator.</p>
                <p class="mt-2">Please contact the administrator.</p>
            </div>
        </template>
    </div>
</div>

{% endblock %}
