{% extends '_base.html' %}
{% load static %}

{% block static %}
<script src="{% static 'js/manage_questions.js' %}"></script>
{% endblock static %}

{% block content %}
<!-- Assuming you have the groupId available in the template context -->
<div class="w-full max-w-2xl mx-auto bg-white shadow-lg rounded p-8 mt-3 mb-3" x-data="manageQuestions()" x-init="init()">
    
    <h2 class="text-2xl font-bold mb-6 text-center" x-text="isEditMode ? 'Edit Question' : 'Manage Questions'"></h2>
    
    <div class="mt-6" x-show="questions.length > 0">
        <h3 class="text-xl font-bold mb-4 text-center">Current Questions</h3>
        <div class="space-y-4">
            <template x-for="(question, index) in questions" :key="question.id">
                <div class="flex flex-wrap items-center justify-between p-3 bg-gray-100 rounded">
                    <div class="flex-1 break-words mr-4">
                        <span class="font-semibold" x-text="question.question"></span>
                    </div>
                    <div class="flex-shrink-0 flex items-center">
                        <button @click="editQuestion(question.id)" class="bg-blue-500 text-white py-1 px-2 rounded focus:outline-none focus:shadow-outline">Edit</button>
                        <button @click="removeQuestion(question.id)" class="ml-2 bg-red-500 text-white p-1 rounded focus:outline-none focus:shadow-outline">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <form @submit.prevent="submitForm()" class="space-y-6" x-ref="questionForm">
        <div class="pt-6" x-show="!isEditMode">
            <h3 class="text-xl font-bold mb-4 text-center">Add Question</h3>
            <!-- Question Text -->
            <div>
                <label for="questionText" class="block text-sm font-medium text-gray-700">Question Text</label>
                <input type="text" id="questionText" x-model="questionText" placeholder="Enter the question here" class="mt-1 p-2 w-full border rounded text-md">
            </div>

            <!-- Question Type -->
            <div>
                <label class="block text-sm font-medium text-gray-700">Question Type</label>
                <div class="mt-1">
                    <label for="textType" class="inline-flex items-center mr-6">
                        <input type="radio" id="textType" value="text" x-model="questionType" class="form-radio">
                        <span class="ml-2 text-md">Text</span>
                    </label>
                    <label for="numberType" class="inline-flex items-center">
                        <input type="radio" id="numberType" value="number" x-model="questionType" class="form-radio">
                        <span class="ml-2 text-md">Number</span>
                    </label>
                </div>
            </div>

            <!-- Mandatory Toggle -->
            <div class="flex items-center mb-4">
                <span class="block text-sm font-medium text-gray-700 mr-3">Mandatory:</span>
                <label for="mandatoryToggle" class="flex items-center cursor-pointer">
                    <!-- Toggle -->
                    <div class="relative">
                        <!-- Input -->
                        <input id="mandatoryToggle" type="checkbox" class="sr-only" x-model="mandatory">
                        <!-- Line -->
                        <div class="w-14 h-8 bg-gray-300 rounded-full shadow-inner"></div>
                        <!-- Dot -->
                        <div class="dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full shadow transition" :class="mandatory ? 'translate-x-7 bg-blue-600' : 'translate-x-0 bg-gray-400'"></div>
                    </div>
                    <!-- Label -->
                    <div class="ml-3 text-md font-medium" x-text="mandatory ? 'Yes' : 'No'"></div>
                </label>
            </div>

            <!-- Default Value Input -->
            <div>
                <label for="default_value" class="block text-sm font-medium text-gray-700">Default Value (Optional)</label>
                <input type="text" id="default_value" x-model="default_value" placeholder="Enter default value" class="mt-1 p-2 w-full border rounded text-md">
            </div>

        </div>
        <div class="pt-6" x-show="isEditMode" x-ref="editQuestionSection">
            <h3 class="text-xl font-bold mb-4 text-center">Edit Question</h3>
            <!-- Question Text Input -->
            <div>
                <label for="questionText" class="block text-sm font-medium text-gray-700">Question Text</label>
                <input type="text" id="questionText" x-model="questionText" placeholder="Enter the question here" class="mt-1 p-2 w-full border rounded text-md">
            </div>
            
        </div>
         <!-- Submit Button -->
         <div class="text-center mt-4">
            <button type="submit" class="bg-blue-500 text-white py-2 px-4 rounded text-lg" x-text="isEditMode ? 'Update' : 'Add'"></button>
        </div>
    </form>

   <!-- Go Back Button -->
   <div class="text-center mt-2">
    <button @click="goBack()" class="bg-gray-500 text-white py-2 px-4 rounded text-lg">Go Back</button>
    </div>
</div>
{% endblock %}
