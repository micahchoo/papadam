{% extends '_base.html' %}
{% load static %}

{% block static %}

<script src="{% static 'js/edit_collection_media_details.js' %}"></script>
{% endblock static %}


{% block content %}

<div class="w-full max-w-lg mx-auto bg-white shadow-lg rounded p-8 mt-3 mb-3" x-data="putCollectionMediaDetails()" x-init="init()">
    <h2 class="text-2xl font-bold mb-6 text-center">Edit Creation Form</h2>
    <form @submit.prevent="saveMediaDetails" class="space-y-6">
      <!-- Name Field -->
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
        <input x-model="name" required type="text" id="name" name="name" class="mt-1 p-2 w-full border rounded">
      </div>

      <!-- Description Field -->
      <div>
        <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
        <textarea id="ckeditorDescription" name="description" rows="4" class="mt-1 p-2 w-full border rounded"></textarea>
      </div>

      <!-- Tags Section -->
      <div>
        <label for="csvTags" class="block text-sm font-medium text-gray-700">Tags</label>
        <!-- Display current tags with an option to remove them -->
        <div class="flex flex-wrap gap-2 mb-2">
          <template x-for="(tag, index) in tags" :key="index">
            <span class="inline-flex items-center bg-gray-200 rounded-full px-3 py-1 text-sm mr-2">
              <span x-text="tag"></span>
              <button type="button" @click="removeTag(tag)" class="text-gray-500 hover:text-gray-700 ml-2">
                &times;
              </button>
            </span>
          </template>
        </div>
        <!-- Input for new tags -->
        <div class="flex items-center">
          <input x-model="newTag" type="text" id="newTag" placeholder="Add new tag" class="mt-1 p-2 w-full border rounded">
          <button @click.prevent="addTag()" class="ml-2 bg-blue-500 text-white py-2 px-4 rounded">Add</button>
        </div>
      </div>

      <!-- Submit Button -->
      <div class="text-center">
        <button type="submit" class="mt-4 bg-blue-500 text-white py-2 px-4 rounded">
          Save Changes
        </button>
      </div>
    </form>
</div>

{% endblock %}
