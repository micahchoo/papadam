{% extends '_base.html' %}
{% load static %}

{% block static %}
<script src="{% static 'js/search.js' %}"></script>
{% endblock static %}



{% block content %}

<div x-data="searchArchiveDetails()" x-init="init" class="bg-gray-200 flex items-center justify-center lg:px-8 mt-4">
  <div class="w-full ">
    <form x-on:submit.prevent="URLConstructor">
      <div class="bg-white lg:p-8 p-2 rounded-lg shadow-md">
        <div class="flex justify-center w-full">
          <div class="p-5 w-full max-w-md sm:max-w-xl lg:max-w-2xl">
            <div class="flex items-center justify-center rounded-lg bg-gray-200 p-5">
              <div class="flex w-full">
                <div
                  class="flex items-center justify-center rounded-tl-lg rounded-bl-lg border-r border-gray-200 bg-white p-5">
                  <svg viewBox="0 0 20 20" aria-hidden="true"
                    class="pointer-events-none absolute w-5 fill-gray-500 transition">
                    <path
                      d="M16.72 17.78a.75.75 0 1 0 1.06-1.06l-1.06 1.06ZM9 14.5A5.5 5.5 0 0 1 3.5 9H2a7 7 0 0 0 7 7v-1.5ZM3.5 9A5.5 5.5 0 0 1 9 3.5V2a7 7 0 0 0-7 7h1.5ZM9 3.5A5.5 5.5 0 0 1 14.5 9H16a7 7 0 0 0-7-7v1.5Zm3.89 10.45 3.83 3.83 1.06-1.06-3.83-3.83-1.06 1.06ZM14.5 9a5.48 5.48 0 0 1-1.61 3.89l1.06 1.06A6.98 6.98 0 0 0 16 9h-1.5Zm-1.61 3.89A5.48 5.48 0 0 1 9 14.5V16a6.98 6.98 0 0 0 4.95-2.05l-1.06-1.06Z">
                    </path>
                  </svg>
                </div>
                <input required type="search" id="search" x-model="search" name="search"
                  class="flex-grow bg-white pl-2 sm:w-50 w-full max-w-[800px] text-base font-semibold outline-none"
                  placeholder="Search here..." />
                <button type="submit"
                  class="bg-blue-500 p-2 rounded-tr-lg rounded-br-lg text-white font-semibold hover:bg-blue-800 transition-colors">Search</button>
              </div>
            </div>
          </div>
        </div>

        <div class="md:flex flex-row  md:justify-around mt-4">
          <div class="mb-6 space-y-4">
            <fieldset>
              <legend class="block text-xl font-bold text-gray-700">Search in:</legend>
              <div class="lg:flex row">
                <label class=" py-2 flex items-center">
                  <input type="radio" name="search_in" value="media" x-model="searchIn"
                    class="text-blue-600 mx-2 border-gray-300 rounded focus:ring-blue-500">
                  Media
                </label>
                <label class=" py-2 flex items-center">
                  <input type="radio" name="search_in" value="annotations" x-model="searchIn"
                    class="text-blue-600 mx-2 border-gray-300 rounded focus:ring-blue-500">
                  Annotations
                </label>
              </div>
            </fieldset>
          </div>
          <div class="mb-6 space-y-4" x-show="searchIn != 'annotations'">
            <fieldset>
              <legend class="block text-xl font-bold text-gray-700">Search where:</legend>
              <div class="lg:flex row">
                <label class="py-2 flex items-center">
                  <input type="radio" name="search_where" value="name" x-model="searchWhere"
                    class="text-blue-600 mx-2 border-gray-300 rounded focus:ring-blue-500" checked>
                  Name
                </label>
                <label class="py-2 flex items-center">
                  <input type="radio" name="search_where" value="description" x-model="searchWhere"
                    class="text-blue-600 mx-2 border-gray-300 rounded focus:ring-blue-500">
                  Description
                </label>
                <!-- Commented section omitted for clarity -->
                <label class="py-2 flex items-center">
                  <input type="radio" name="search_where" value="tags" x-model="searchWhere"
                    class="text-blue-600 mx-2 border-gray-300 rounded focus:ring-blue-500">
                  Tags
                </label>
              </div>
            </fieldset>
          </div>

          <div class="mb-6 space-y-4" x-show="searchIn == 'annotations'">
            <fieldset>
              <legend class="block text-xl font-bold text-gray-700">Search where:</legend>
              <div class="lg:flex row">
                <label class="py-2 flex items-center">
                  <input type="radio" name="search_where" value="name" x-model="searchWhere"
                    class="text-blue-600 mx-2 border-gray-300 rounded focus:ring-blue-500" checked>
                  Annotation Name
                </label>
                <label class="py-2 flex items-center">
                  <input type="radio" name="search_where" value="tags" x-model="searchWhere"
                    class="text-blue-600 mx-2 border-gray-300 rounded focus:ring-blue-500">
                  Annotation Tags
                </label>
              </div>
            </fieldset>
          </div>

          <div class="mb-6 space-y-4">
            <fieldset>
              <legend class="block text-xl font-bold text-gray-700">Search From:</legend>
              <div class="lg:flex row">
                <label class="py-2 flex items-center">
                  <input type="radio" name="searchFrom" value="all_collections" x-model="searchFrom"
                    class="text-blue-600 mx-2 border-gray-300 rounded focus:ring-blue-500" checked>
                  Public collections
                </label>
                <label x-show="isLoggedIn" class="py-2 flex items-center">
                  <input type="radio" name="searchFrom" value="my_collections" x-model="searchFrom"
                    class="text-blue-600 mx-2 border-gray-300 rounded focus:ring-blue-500">
                  My collections
                </label>
                <label x-show="isLoggedIn" class="py-2 flex items-center">
                  <input type="radio" name="searchFrom" value="selected_collections" x-model="searchFrom"
                    class="text-blue-600 mx-2 border-gray-300 rounded focus:ring-blue-500">
                  Selected collections
                </label>
              </div>
            </fieldset>
          </div>
        </div>
        <div x-show="searchFrom === 'selected_collections'" class="mt-4">
          <label class="block text-xl font-bold text-gray-700">Select collections:</label>
          <div class="mt-2">
            <template x-for="collection in myCollections" :key="collection.id">
              <label class="block">
                <input type="checkbox" @change="updateSelection($event, collection.id)" :value="collection.id"
                  class="mr-2">
                <span x-text="collection.name"></span>
              </label>
            </template>
          </div>
        </div>
    </form>
  </div>
  {%include 'partials/common/loader.html'%}

  <div class="mt-6 lg:flex flex-wrap gap-6" >
    <template x-for="collection in allArchiveDetails" :key="collection.id">
      {% include 'partials/collection/collection_listing.html' %}
    </template>
  </div>
  <div class="mt-6 lg:flex flex-wrap gap-6" >
    <template x-for="annotation in allAnnotateDetails" :key="annotation.id">
      <div class="h-100 w-[400px] rounded-lg mt-2 mb-4 bg-white p-4 m-2">
        <!-- Scrollable text -->
        <div class="absolute top-0 right-0 bg-blue-500 text-white px-2 py-1 text-sm font-bold" x-text="annotation.media_target"></div>                
        <div class="mb-2 mt-4 h-24 overflow-auto">
            <p x-html="annotation.annotation_text"></p>
        </div>
        <!-- Tags/Hashtags -->
        <div class="flex flex-wrap gap-2">
            <template x-for="tag in annotation.tags">
                <span class="rounded bg-gray-200 p-1 text-sm text-gray-700" x-text="tag.name"></span>
            </template>
        </div>
        <!-- Name and Actions -->
        <div class="flex justify-between items-center">
          <p class="text-sm text-gray-600 flex-grow" x-text="annotation.created_by.username"></p>
          <a :href="'/ui/collection/' + annotation.collection.id + '/media/' + collection.media_reference_id +'/'" class="text-sm text-gray-600 flex-grow">Explore</a>
        </div>
      </div>
    </template>
  </div>
  <div x-show="searchIn === 'media' && allArchiveDetails.length === 0" class="text-gray-600 mt-4 text-center">
    No results found.
  </div>
  <div x-show="searchIn === 'annotations' && allAnnotateDetails.length === 0" class="text-gray-600 mt-4 text-center">
    No results found.
  </div>
  <br>
</div>
</div>
{% endblock %}
