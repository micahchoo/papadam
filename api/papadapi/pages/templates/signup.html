{% extends '_base.html' %}
{% load static %}

{% block static %}
  <script src="{% static 'js/signup.js' %}"></script>
{% endblock static %}



{% block content %}

<div x-data="postSignup()" class="bg-gray-200 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded shadow-md w-96">
        <h1 class="text-2xl font-semibold mb-4">Sign Up</h1>
        <div class="mb-4">
            <label for="first_name" class="block text-sm font-medium text-gray-600">First Name</label>
            <input type="text" id="first_name" x-model="signupDetails.first_name" name="first_name" class="mt-1 p-2 w-full border rounded">
        </div>
        <div class="mb-4">
            <label for="first_name" class="block text-sm font-medium text-gray-600">Last Name</label>
            <input type="text" id="last_name" x-model="signupDetails.last_name" name="last_name" class="mt-1 p-2 w-full border rounded">
        </div>
        <div class="mb-4">
            <label for="username" class="block text-sm font-medium text-gray-600">Username</label>
            <input type="text" id="username" x-model="signupDetails.username" name="username" class="mt-1 p-2 w-full border rounded">
        </div>
        <div x-text="usernameError" class="text-red-500 text-sm italic mb-2"> {{ usernameError }}</div>
        <div class="mb-4">
            <label for="password" class="block text-sm font-medium text-gray-600">Password</label>
            <input type="password" id="password" x-model="signupDetails.password" name="password" class="mt-1 p-2 w-full border rounded">
        </div>
        <div x-text="passwordError" class="text-red-500 text-sm italic mb-2"> {{ passwordError }}</div>
        <div class="mb-4">
            <label for="email" class="block text-sm font-medium text-gray-600">Email</label>
            <input type="email" id="email" x-model="signupDetails.email" name="email" class="mt-1 p-2 w-full border rounded">
        </div>
        <button class="bg-blue-500 text-white px-4 py-2 rounded" @click="doSignUp()">Sign up</button>
    </div>
</div>

{% endblock %}
