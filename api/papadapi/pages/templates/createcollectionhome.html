{% extends '_base.html' %}
{% load static %}

{% block static %}
  <script src="{% static 'js/create_collection_details.js' %}"></script>
{% endblock static %}



{% block content %}




  <div x-data class="space-y-2">
      <div class="grid grid-cols-1 gap-4 lg:grid-cols-3 lg:gap-8 mt-4 mb-4 ml-3 mr-3">


        <div class="bg-transparent w-[100vw] py-4 flex items-center justify-center">
          <div x-data="postCollectionDetails()" x-init="init">
          
                  <div class="lg:w-[1000px] p-5 space-y-6 bg-white rounded-lg shadow-lg">
                    <h2 class="text-3xl font-bold text-center">Create a Collection</h2>
                    <form class="mt-8 space-y-6" @submit.prevent="submitForm">
                      <div>
                        <label for="name" class="block text-xl py-2 font-medium text-gray-700">Name :</label>
                        <input type="text" id="name" x-model="createCollectionDetails.name" name="name" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="Enter name..." minlength="3">
                        <p class="mt-2 text-xs text-gray-500">Name must be at least 3 characters long.</p>
                      </div>
                      <div>
                        <label for="description" class="block text-xl py-2 font-medium text-gray-700">Description :</label>
                        <textarea  id="description" name="description" x-ref="collectionDescription" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"></textarea>
                        <script>
                          CKEDITOR.replace('description');
                        </script>
                      </div>
                      <div class="flex items-start justify-start overflow-hidden">
                        <label class="inline-flex relative items-center mr-5 cursor-pointer">
                            <input type="checkbox" x-model="createCollectionDetails.is_public" class="sr-only peer" @click="createCollectionDetails.is_public = !createCollectionDetails.is_public; console.log('Value:', createCollectionDetails.is_public)">
                            <div class="w-6 h-6 rounded-full bg-gray-300 shadow-inner peer">
                                <div x-bind:class="{ 'bg-green-500': createCollectionDetails.is_public, 'bg-blue-500': !createCollectionDetails.is_public }" class="w-11 h-6 bg-green-500 rounded-full peer peer-focus:ring-blue-300 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white  after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-500"></div>
                            </div>
                        </label>
                        <span class="ml-2" x-text="createCollectionDetails.is_public ? 'Public' : 'Private'"></span>
                    </div>
                                        
                      <div class="flex items-center justify-between">
                        <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">Create</button>
                      </div>
                    </form>
                  </div>
                </div>
                
          </div>  
      </div>
  </div>


    
{% endblock %}
