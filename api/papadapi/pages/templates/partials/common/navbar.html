{% load static %}

{% block static %}
<link rel="shortcut icon" type="image/png" href="{% static 'images/favicon.ico' %}"/>
<script src="{% static 'js/logout.js' %}"></script>
<header class="sticky top-0 z-50 bg-white shadow" x-data="headerData()">
    <div class="container mx-auto px-4" x-data="{showMenu: false}">
        <nav class="flex justify-between items-center py-3">
            <!-- Logo and Brand Name -->
            <div class="flex items-center space-x-2">
                <a href="/ui/" class="flex items-center">
                    <img src="{% static 'images/logo.png' %}" alt="logo" class="h-10 sm:h-14 mr-2"> 
                    <span class="font-bold text-lg">Plasma</span>
                </a>
            </div>

            <!-- Mobile Menu Button and Search Bar -->
            <div class="flex lg:hidden items-center space-x-2">
                <!-- Search Bar -->
                <div class="flex items-center bg-gray-100 rounded-md flex-1">
                    <!-- Search Input -->
                    <input type="search" x-model="searchString" placeholder="Search here..." class="bg-[#e6f4ff] border-2 rounded-3xl border-[#91caff] w-full h-[2em] text-gray-700 focus:outline-none focus:border-purple-500" x-model="searchString">
                    <button @click="window.location.href = `/ui/search/?search=${encodeURIComponent(searchString)}&searchIn=media&searchWhere=name&searchFrom=all_collections`"
                     class="py-[0.5rem] -ml-8 -mt-[3px] shadow-lg bg-[#ecf0f5] border-[2px] border-[#91caff] rounded-3xl w-[2.4rem] h-[2.4rem] text-gray-700 hover:outline-none hover:border-purple-500">

                        <svg xmlns="http://www.w3.org/2000/svg" class="mr-2" fill="currentColor" viewBox="0 0 24 24" stroke="currentColor" stroke-width="0" width="20" height="20">
                            <path fill="none" d="M0 0h24v24H0z" />
                            <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
                        </svg>
                    </button>
                </div>
                <!-- Mobile Menu Button -->
                <button @click="showMenu = !showMenu" class="focus:outline-none ml-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                    </svg>
                </button>
            </div>

            <!-- Desktop Menu -->
            <div class="hidden lg:flex items-center space-x-4">
                <!-- Navigation Links -->
                <a href="/ui/" class="text-black hover:bg-gray-700 hover:text-white flex w-auto px-2 py-2 rounded-md text-md font-medium place-items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="mr-2" fill="currentColor" viewBox="0 0 512 512" stroke="currentColor" stroke-width="0" width="20" height="20">
                        <path d="M261.56 101.28a8 8 0 00-11.06 0L66.4 277.15a8 8 0 00-2.47 5.79L63.9 448a32 32 0 0032 32H192a16 16 0 0016-16V328a8 8 0 018-8h80a8 8 0 018 8v136a16 16 0 0016 16h96.06a32 32 0 0032-32V282.94a8 8 0 00-2.47-5.79z" />
                        <path d="M490.91 244.15l-74.8-71.56V64a16 16 0 00-16-16h-48a16 16 0 00-16 16v32l-57.92-55.38C272.77 35.14 264.71 32 256 32c-8.68 0-16.72 3.14-22.14 8.63l-212.7 203.5c-6.22 6-7 15.87-1.34 22.37A16 16 0 0043 267.56L250.5 69.28a8 8 0 0111.06 0l207.52 198.28a16 16 0 0022.59-.44c6.14-6.36 5.63-16.86-.76-22.97z" />
                    </svg>
                    Home
                </a>
                <a href="/ui/about" class="text-black hover:bg-gray-700 hover:text-white flex w-auto px-2 py-2 rounded-md text-md font-medium place-items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                    &nbsp;About
                </a>

               <!-- Search Bar -->
                <div class="flex items-center bg-gray-100 rounded-md">
                <!-- Search Input -->
                <input type="search" x-model="searchString" placeholder=" Search here..." class="flex-grow bg-[#e6f4ff] border-2 rounded-3xl border-[#91caff] h-[2em] text-gray-700 focus:outline-none focus:border-purple-500" x-model="searchString">
                <button @click="window.location.href = `/ui/search/?search=${encodeURIComponent(searchString)}&searchIn=media&searchWhere=name&searchFrom=all_collections`" class="py-[0.5rem] -ml-8 -mt-[3px] shadow-lg bg-[#ecf0f5] border-[2px] border-[#91caff] rounded-3xl w-[2.4rem] h-[2.4rem] text-gray-700 hover:outline-none hover:border-purple-500 flex items-center justify-center"> <!-- Centered the content -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="mr-2" fill="currentColor" viewBox="0 0 24 24" stroke="currentColor" stroke-width="0" width="20" height="20">
                        <path fill="none" d="M0 0h24v24H0z" />
                        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
                    </svg>
                </button>
                </div>



              <!-- Auth Links -->
              <template x-if="isLoggedIn">
                <p x-show="myName" :style="'width: ' + (myName.length * 10) + 'px'" class="h-5 text-black text-center bg-[#91caff] rounded-md flex items-center justify-center font-medium leading-snug py-3.5" x-text="myName"></p>
            </template>

            <template x-if="isLoggedIn">

                <a @click="logout" class="text-black hover:bg-gray-700 hover:text-white flex w-auto px-2 py-2 rounded-md text-md font-medium place-items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 17l5-5-5-5M19.8 12H9M10 3H4v18h6"/></svg>
                    &nbsp;Logout
                </a>
            </template>
            <template x-if="!isLoggedIn">
                <a href="/ui/login" class="text-black hover:bg-gray-700 hover:text-white flex w-auto px-2 py-2 rounded-md text-md font-medium place-items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v18h-6M10 17l5-5-5-5M13.8 12H3"/></svg>
                    &nbsp;Login
                </a>
            </template>
            <template x-if="!isLoggedIn">
                <a href="/ui/signup" class="text-black hover:bg-gray-700 hover:text-white flex w-auto px-2 py-2 rounded-md text-md font-medium place-items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5.52 19c.64-2.2 1.84-3 3.22-3h6.52c1.38 0 2.58.8 3.22 3"/><circle cx="12" cy="10" r="3"/><circle cx="12" cy="12" r="10"/></svg>
                    &nbsp;           Sign Up
                </a>
            </template>
        </div>
        </nav>

        <!-- Mobile Menu -->
        <div x-show="showMenu" class="lg:hidden">
            <ul class="mt-4 space-y-2">
                <li>
                    <template x-if="isLoggedIn">
                        <p x-show="myName" :style="'width: ' + (myName.length * 10) + 'px'" class="h-5 text-black text-center bg-[#91caff] rounded-md flex items-center justify-center font-medium leading-snug py-3.5" x-text="myName"></p>
                    </template>
                </li>
                <li>
                    <a href="/ui/" class="text-black hover:bg-gray-700 hover:text-white flex w-auto px-2 py-2 rounded-md text-md font-medium place-items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="mr-2" fill="currentColor" viewBox="0 0 512 512" stroke="currentColor" stroke-width="0" width="20" height="20">
                            <path d="M261.56 101.28a8 8 0 00-11.06 0L66.4 277.15a8 8 0 00-2.47 5.79L63.9 448a32 32 0 0032 32H192a16 16 0 0016-16V328a8 8 0 018-8h80a8 8 0 018 8v136a16 16 0 0016 16h96.06a32 32 0 0032-32V282.94a8 8 0 00-2.47-5.79z" />
                            <path d="M490.91 244.15l-74.8-71.56V64a16 16 0 00-16-16h-48a16 16 0 00-16 16v32l-57.92-55.38C272.77 35.14 264.71 32 256 32c-8.68 0-16.72 3.14-22.14 8.63l-212.7 203.5c-6.22 6-7 15.87-1.34 22.37A16 16 0 0043 267.56L250.5 69.28a8 8 0 0111.06 0l207.52 198.28a16 16 0 0022.59-.44c6.14-6.36 5.63-16.86-.76-22.97z" />
                        </svg>
                        Home
                    </a>
                </li>
                <li>
                    <a href="/ui/about" class="text-black hover:bg-gray-700 hover:text-white flex w-auto px-2 py-2 rounded-md text-md font-medium place-items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                        &nbsp;About
                    </a>
                </li>
                <li>
                    <template x-if="isLoggedIn">
                        <a @click="logout" class="text-black hover:bg-gray-700 hover:text-white flex w-auto px-2 py-2 rounded-md text-md font-medium place-items-center">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 17l5-5-5-5M19.8 12H9M10 3H4v18h6"/></svg>
                            &nbsp;Logout
                        </a>
                    </template>
                </li>
                <li>
                    <template x-if="!isLoggedIn">
                        <a href="/ui/login" class="text-black hover:bg-gray-700 hover:text-white flex w-auto px-2 py-2 rounded-md text-md font-medium place-items-center">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v18h-6M10 17l5-5-5-5M13.8 12H3"/></svg>
                            &nbsp;Login
                        </a>
                    </template>
                </li>
                <li>
                <template x-if="!isLoggedIn">
                    <a href="/ui/signup" class="text-black hover:bg-gray-700 hover:text-white flex w-auto px-2 py-2 rounded-md text-md font-medium place-items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5.52 19c.64-2.2 1.84-3 3.22-3h6.52c1.38 0 2.58.8 3.22 3"/><circle cx="12" cy="10" r="3"/><circle cx="12" cy="12" r="10"/></svg>
                        &nbsp;           Sign Up
                    </a>
                </template>
            </li>
            </ul>
        </div>
    </div>
</header>
{% endblock static %}
