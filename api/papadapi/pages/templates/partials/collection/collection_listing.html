{% load static %}

{% block static %}
<div class="container mx-auto p-4">
  <div class="h-100 w-full md:w-[400px] rounded-lg bg-gray-200 mt-2 mb-4">
    <article class="rounded-xl bg-white border-2 border-indigo-500 p-4 sm:p-6 lg:p-8 h-full hover:shadow-xl transition-shadow duration-300 ease-in-out">
      <div class="card-header mb-4">
        <h1 x-text="collection.name" class="text-start text-xl font-bold"></h1>
      </div>
      <div class="card-body">
        <img src={% static "images/Creative-Commons.ico" %}
             alt="Collection Image" class="w-full h-[332px] object-cover rounded-lg mb-4"
             onerror="this.src='http://www.iconarchive.com/download/i82888/limav/flat-gradient-social/Creative-Commons.ico'" />

        <div class="card-description text-sm text-gray-700 overflow-auto flex flex-col gap-3 h-full mb-6 text-start"
             x-html="truncateToWord(collection.description, 14)"></div>
        <div class="tags flex items-start mb-4">
          <template x-if="collection.tags.length > 0">
            <template x-for="tag in collection.tags.slice(0, 2)">
              <strong class="rounded border border-indigo-500 bg-indigo-500 px-3 mx-1 text-[10px] font-medium text-white" x-text="tag.name"></strong>
            </template>
          </template>
          <template x-if="collection.tags.length === 0">
            <span class="bg-white px-3 py-1.5 mx-1 text-[10px] font-medium text-white">&nbsp;</span>
          </template>
        </div>
        
        <div class="status mt-2 sm:flex sm:items-center sm:gap-2">
          <div class="flex items-start gap-1 text-gray-500">
            <svg class="h-4 w-4"
                 fill="none"
                 stroke="currentColor"
                 viewBox="0 0 24 24"
                 xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <p class="text-xs font-medium">
              <span x-text="collection.users_count"></span> contributors working on <span x-text="collection.media_count"></span> stories
            </p>
          </div>
        </div>
        <button class="w-full bg-blue-500 text-white py-2 mt-4 rounded" x-on:click="window.location.href='/ui/collection/' + collection.id + '/'">
          Explore
        </button>
      </div>
    </article>
  </div>
</div>
{% endblock static %}
