    <!-- Centered Video.js Player with full width -->

    <div x-show="!isLoading" class="relative w-full" style="padding-bottom: 56.25%;">
      <video id="my-video" class="video-js absolute top-0 left-0 w-full h-full" controls preload="auto" >
        <p class="vjs-no-js">
          To view this video please enable JavaScript, and consider upgrading to a web browser that
          <a href="https://videojs.com/html5-video-support/" target="_blank"> supports HTML5 video </a>
        </p>
      </video>
    </div>
    
    <div x-show= "inGroup()" class="flex flex-col md:flex-row mt-4 w-full">
      <p>Current Time: <span x-text="currentTime"></span> seconds</p>
    </div>
    <!-- Video Controls and text area -->
    <div x-show= "inGroup()" class="flex flex-col md:flex-row mt-4 w-full">
      <!-- Button Container - Single column on the left -->
      <div class="md:flex md:flex-col md:w-1/4 space-y-2">
        <!-- Toggle Play button -->
        <button class="bg-blue-500 text-white p-2 rounded hover:bg-blue-700 w-full" @click="togglePlay()" x-text="playText"></button>
        
        <!-- Start @ button with input -->
        <div class="flex items-center">
          <button class="bg-blue-500 text-white p-2 rounded hover:bg-blue-700 w-2/3" @click="updateStartTime">Start @</button>
          <input x-model="targetStart" class="flex-1 ml-2 p-2 border rounded w-1/3">
        </div>
        
        <!-- End @ button with input -->
        <div class="flex items-center">
          <button class="bg-blue-500 text-white p-2 rounded hover:bg-blue-700 w-2/3" @click="updateEndTime">End @</button>
          <input x-model="targetEnd" class="flex-1 ml-2 p-2 border rounded w-1/3">
        </div>
      </div>
      
      <!-- Textarea and Tags Container - Takes up remaining space -->
      <div class="flex-1 md:pl-2">
        <!-- Textarea -->
        <textarea class="w-full h-24 p-2 border rounded mb-2 mt-2 md:mt-1" x-model="annotationText" placeholder="Your text here..."></textarea>
        
        <!-- Tags display -->
        <div class="flex flex-wrap mb-2">
          <template x-for="(tag, index) in tags" :key="index">
            <span class="inline-flex items-center bg-blue-100 text-blue-800 text-sm font-semibold mr-2 mb-2 px-2.5 py-0.5 rounded">
              <span x-text="tag"></span>
              <button class="ml-2 text-red-600 hover:text-red-800" @click="removeTag(index)">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
              </button>
            </span>
          </template>
        </div>
        
        
        <!-- Tags input -->
        <input type="text" x-model="newTag" placeholder="Enter tags seperated by commas" class="focus:ring-1 w-full h-10 p-2 border rounded" @keyup.enter="addTag()" @keydown.comma.prevent="addTag()">
      </div>
    </div>
    <!-- Display error message if validation fails -->
    <div x-show="errorMessage" class="text-red-500 mt-2">
   <span x-text="errorMessage"></span>
    </div>
    <!-- Annotate Button - Full width below the above elements -->
    <button x-show= "inGroup()" @click="createOrEditAnnotation" class="bg-blue-500 text-white p-2 rounded hover:bg-blue-700 w-full mt-4">Annotate</button>
