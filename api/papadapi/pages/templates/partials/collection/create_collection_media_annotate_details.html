<div x-data="postCollectionMediaAnnotateDetails()" x-init="init">
    <template x-for="media in createCollectionMediaAnnotateDetails">
      <div x-data="postCollectionDetails()" x-init="init">
        <div class="flex items-center justify-center align-center  bg-gray-100 ">
            <div class="w-full p-5 space-y-6 bg-white rounded-lg shadow-lg">
              <h2 class="text-3xl font-bold text-center">Create Media</h2>
              <form class="mt-8 space-y-6" action="#" method="POST">
                <div>
                  <label for="collection-name" class="block text-sm font-medium text-gray-700">Name</label>
                  <input type="text" id="collection-name" name="collection-name" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="Enter name..." minlength="3">
                  <p class="mt-2 text-xs text-gray-500">Name must be at least 3 characters long.</p>
                </div>
                <div>
                  <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
                  <textarea id="description" name="description" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"></textarea>
                  <script>
                    CKEDITOR.replace('description');
                  </script>
                </div>
                <div>
                  <label for="collection-image" class="block text-sm font-medium text-gray-700">Upload media</label>
                  <input type="file" id="collection-image" name="collection-image" accept="image/*" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                  <p class="mt-2 text-xs text-gray-500">Attach an image file. Accepts JPEG, PNG, etc.</p>
                </div>
                <div class="flex items-center justify-between">
                  <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">Create</button>
                </div>
              </form>
            </div>
          </div>
          
    </div>  
    </template>
  </div>
