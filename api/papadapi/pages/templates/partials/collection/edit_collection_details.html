<div class="bg-transparent w-[100vw] py-4 flex items-center justify-center">
    <div x-data="putCollectionDetails()" x-init="init">
        <div class="lg:w-[1000px] p-5 space-y-6 bg-white rounded-lg shadow-lg">
            <h2 class="text-3xl font-bold text-center">Edit Collection</h2>
            <form class="mt-8 space-y-6" @submit.prevent="submitForm">
                <!-- Name Field -->
                <div>
                    <label for="name" class="block text-xl py-2 font-medium text-gray-700">Name :</label>
                    <input type="text" id="name" x-model="editCollectionDetails.name" name="name" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="Enter name..." minlength="3">
                </div>

                <!-- Description Field -->
                <div>
                    <label for="description" class="block text-xl py-2 font-medium text-gray-700">Description :</label>
                    <textarea id="description" name="description" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"></textarea>
                </div>

                <!-- Public/Private Checkbox -->
                <div class="flex items-start justify-start overflow-hidden">
                    <label class="inline-flex relative items-center mr-5 cursor-pointer">
                        <input type="checkbox" x-model="editCollectionDetails.is_public" class="sr-only peer">
                        <div class="w-11 h-6 bg-green-500 rounded-full peer peer-focus:ring-blue-300 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white  after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-500"></div>
                    </label>
                    <span x-text="editCollectionDetails.is_public ? 'Public' : 'Private'"></span>
                </div>

                <!-- Submit Button -->
                <div class="flex items-center justify-between">
                    <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">Save changes</button>
                </div>
            </form>
        </div>
    </div>  
</div>
