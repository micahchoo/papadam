{% extends '_base.html' %}
{% load static %}

{% block static %}
<script src="{% static 'js/add_remove_users.js' %}"></script>    
{% endblock static %}



{% block content %}


<div class="w-full max-w-lg mx-auto bg-white shadow-lg rounded p-8 mt-3 mb-3" x-data="addRemoveUsers()" x-init="init()">
    <h2 class="text-2xl font-bold mb-6 text-center">Add/Remove Users</h2>
    <form @submit.prevent="goBack()" class="space-y-6">
        <!-- Add User Section -->

        <!-- Display current users with an option to remove them -->
<div class="flex flex-wrap gap-2 mb-2" id="userList">
    <template x-for="user in collectionDetails.users" :key="user.id">
        <div class="inline-flex items-center bg-gray-200 rounded-full px-3 py-1 text-sm mr-2">
            <span x-text="user.username"></span>
            <button type="button" @click="removeUser(user.id)" class="text-gray-500 hover:text-gray-700 ml-2">
                &times;
            </button>
        </div>
    </template>
</div>

<div>
    <label for="newUser" class="block text-sm font-medium text-gray-700">Add User</label>
    <div class="flex items-center">
        <!-- Input for typing the username -->
        <input list="userList" @keyup.prevent="searchUserId()" x-model="userSearch" type="text" id="newUser" placeholder="Type user's name" class="mt-1 p-2 w-full border rounded">
    </br>
        <select x-model="user" id="userList"  class="mt-1 p-2 w-full border rounded">
            <!-- Display existing users as options -->
            <template x-for="user in users" :key="user.id">
                <option :value="user.id"><span x-text="user.username"></span></option>
            </template>
        </select>
        <button @click="addUser()" class="ml-2 bg-blue-500 text-white py-2 px-4 rounded" type="button">Add</button>
    </div>
</div>




        <!-- Submit Button -->
        <div class="text-center">
            <button type="submit" class="mt-4 bg-blue-500 text-white py-2 px-4 rounded">
                Go back
            </button>
        </div>
    </form>
</div>
       

{% endblock %}
