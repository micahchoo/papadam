{% extends '_base.html' %}
{% load static %}

{% block static %}
  <script src="{% static 'js/collection_management.js' %}"></script>

{% endblock static %}



{% block content %}

<div class="container mx-auto p-5 bg-background-color mt-5 rounded-md" x-data="getCollectionList()" x-init="init" >
  <div class="flex justify-between">
    <template x-if="isLoggedIn">
      <div>
        <button x-on:click="window.location.href='/ui/collection/create'" class="text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center mr-2 mb-2 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800">
          + Create new collection
        </button>
      </div>
    </template>
  
    <div class="relative inline-block text-left" id="dropdown">
        {% comment %} <button class="inline-flex justify-center w-full px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md shadow-sm hover:bg-gray-50" id="dropdownButton">
           Sort by
            <svg class="-mr-1 ml-2 h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
            </svg>
        </button> {% endcomment %}
        <div class="hidden origin-top-right absolute right-0 mt-2 w-56 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5" id="dropdownContent">
            <div class="py-1">
                <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Option 1</a>
                <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Option 2</a>
                <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Option 3</a>
            </div>
        </div>
    </div>
  </div>
  <div class="flex justify-center my-4">
    <div class="inline-flex p-1 space-x-1 bg-blue-900/20 rounded-xl" id="tabs">
      <template x-if="isLoggedIn">
      <!-- View my collection -->
      <button x-on:click="collectionClass = 'myCollection'" x-bind:class="collectionClass === 'myCollection' ? 'bg-blue-600 text-white' :  'text-blue-700 bg-white'" class="tab px-4 py-2 text-sm font-medium rounded-lg focus:outline-none" id="horizontal-tab">My collections</button>
      </template>
      <!-- View all Public collections -->
      <button x-on:click="collectionClass = 'publicCollection'" x-bind:class="collectionClass === 'publicCollection' ? 'bg-blue-600 text-white' :  'text-blue-700 bg-white'" class="tab px-4 py-2 text-sm font-medium rounded-lg focus:outline-none" id="vertical-tab">All collections</button>
    </div>
  </div>
  
  <!-- Content Area for API Results -->
  <div id="content" class="mt-4 text-center" >
    <!-- Content will be loaded here based on the selected tab -->
    <template x-if="isLoggedIn">
    <div x-show="collectionClass === 'myCollection'" class="grid grid-cols-1 gap-4 lg:grid-cols-3 lg:gap-8" id="content">
      {% include 'partials/common/loader.html' %}
      <template x-for="collection in myCollections" :key="collection.id" id="content">
        {% include 'partials/collection/collection_listing.html' %}
      </template>
    </div>
  </template>

    <div x-show="collectionClass === 'publicCollection'" class="grid grid-cols-1 gap-4 lg:grid-cols-3 lg:gap-8" id="content">
      {% include 'partials/common/loader.html' %}
      <template x-for="collection in publicCollections" :key="collection.id" id="content">
        {% include 'partials/collection/collection_listing.html' %}
      </template>
      <template x-if="isLoggedIn">
        <template x-for="collection in myCollections" :key="collection.id" id="content">
          {% include 'partials/collection/collection_listing.html' %}
        </template>
        <template>
    </div>
  </div>
</div>
{% endblock %}
