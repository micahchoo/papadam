{% extends '_base.html' %}
{% load static %}

{% block static %}
<script src="{% static 'js/create_collection_media_details.js' %}"></script>
{% endblock static %}

{% block content %}


<div class="w-full max-w-lg mx-auto bg-white shadow-lg rounded p-8 mt-3 mb-3" x-data="assetsDropzoneData()" x-init="init()">
  <h2 class="text-2xl font-bold mb-6 text-center">Creation Form</h2>
  <form @submit.prevent="uploadMediaToCollection">

    <!-- Name Field -->
    <div class="mb-4">
      <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
      <input x-model="name" required type="text" id="name" name="name" class="mt-1 p-2 w-full border rounded">
    </div>

    <!-- Description Field -->
    <div class="mb-4">
      <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
      <textarea id="ckeditorDescription" name="description" rows="4" class="mt-1 p-2 w-full border rounded"></textarea>
    </div>

    <!-- CSV Tags Input -->
    <div class="mb-4">
      <label for="csvTags" class="block text-sm font-medium text-gray-700">Tags</label>
      <input type="text" x-model="tags" id="csvTags" name="csvTags" placeholder="tag1, tag2, tag3" class="mt-1 p-2 w-full border rounded">
      <p class="text-xs text-gray-500 mt-1">Enter tags separated by commas.</p>
      <!-- Error message for tags -->
      <p x-show="tagError" class="text-red-500 text-sm mt-1" x-text="tagError"></p>
    </div>

    <!-- File Field -->
    <div class="mb-6">
      <label for="file" class="block text-sm font-medium text-gray-700">Upload File</label>
      <input type="file" required id="file" name="file" class="mt-1 block w-full" @change="fileChosen">
      <p class="text-xs text-gray-500 mt-1">Upload only audio/video files.</p>
      <!-- Error message for file -->
      <p x-show="fileError" class="text-red-500 text-sm mt-1" x-text="fileError"></p>
    </div>

    <!-- Progress Bar -->
    <div x-show="isUploadTrigger">
      <span id="ProgressLabel" class="sr-only">Loading</span>
      <span role="progressbar" aria-labelledby="ProgressLabel" x-bind:aria-valuenow="progress" class="block rounded-full bg-gray-200 mt-3">
        <span class="block h-4 rounded-full bg-indigo-600 text-center text-[10px]" x-bind:style='`width:${progress}%`'>
          <span class="font-bold text-white" x-text="`${progress}%`"></span>
        </span>
      </span>
      <span x-html="uploadDetails"></span> 
    </div>
     <!-- Error Message -->
     <div x-show="uploadError !== ''" class="mt-4">
      <p class="text-red-500 text-sm mt-1" x-text="uploadError"></p>
    </div>
    <div class="mt-4"></div> 

    <!-- Submit Button -->
    <div class="text-center">
      <button type="submit"
              :disabled="isUploadTrigger"
              class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-700"
              x-text="isUploadTrigger ? 'Uploading...' : 'Upload'">
      </button>
    </div>
  </form>
</div>

{% endblock %}
