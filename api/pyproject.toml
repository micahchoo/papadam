# papadam/api — Python tooling configuration

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "S",    # bandit (security)
    "T20",  # no print() in source
    "RUF",  # ruff-specific
    "ASYNC",# flake8-async — catch blocking calls in async context
    "TCH",  # flake8-type-checking — move type-only imports under TYPE_CHECKING
    "PT",   # flake8-pytest-style — consistent pytest idioms
    "SIM",  # flake8-simplify — unnecessary complexity
    "DTZ",  # flake8-datetimez — naive datetime usage
    "ERA",  # eradicate — commented-out code
    "PERF", # perflint — performance anti-patterns
]
ignore = [
    "S101",   # assert in tests is fine
    "B008",   # DRF uses function calls as default args (e.g. openapi_schema_field)
    "RUF012", # Django class attributes (Meta.ordering, permission_classes, etc.) are fine as lists
]

[tool.ruff.lint.per-file-ignores]
"*/tests/*"    = ["S", "T20"]      # tests can use assert and print
"*/test*"      = ["S", "T20"]
"conftest.py"  = ["S"]
"manage*.py"   = ["T20"]
"*/migrations/*" = ["E501"]        # generated code, long lines expected
"*/config/*"     = ["S105", "E501"] # dev/test settings: placeholder secrets + long setting values
"*/archive/views.py" = ["S108"]    # /tmp/upload/ is intentional for the HLS processing pipeline

[tool.ruff.lint.isort]
known-first-party = [
    "users", "archive", "annotate", "common",
    "importexport", "crdt", "events", "exhibit", "media_relation",
]

# ── mypy ──────────────────────────────────────────────────────────────────────

[tool.mypy]
python_version = "3.12"
plugins = ["mypy_django_plugin.main", "mypy_drf_plugin.main"]
ignore_missing_imports = true
# Progressive strictness — tighten per phase
warn_return_any = true
warn_unused_ignores = true
no_implicit_reexport = true

[[tool.mypy.overrides]]
module = "*.migrations.*"
ignore_errors = true

[tool.django-stubs]
django_settings_module = "papadapi.config.test"

# ── pytest ────────────────────────────────────────────────────────────────────

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "papadapi.config.test"
python_files  = ["test_*.py", "*_test.py", "tests.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"   # pytest-asyncio: all async test functions run automatically

addopts = [
    "--strict-markers",
    "--tb=short",
    "--cov=papadapi",
    "--cov-report=term-missing",
    "--cov-report=xml",
    "--cov-fail-under=80",   # CI fails below 80% coverage
    "-p", "no:warnings",
]
markers = [
    "slow: marks tests as slow (deselect with -m 'not slow')",
    "integration: marks tests requiring external services",
]

# ── coverage ──────────────────────────────────────────────────────────────────

[tool.coverage.run]
source = ["papadapi"]
omit = [
    "*/migrations/*",
    "*/tests/*",
    "*/test_*",
    "manage*.py",
    "*/config/*",
    "*/wsgi.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]

# ── import-linter (architecture as code) ─────────────────────────────────────
#
# Enforces the dependency graph between Django apps.
# A contract violation fails CI exactly like a failing test.
#
# Allowed dependency direction (layered):
#
#   common  ←  users  ←  archive  ←  annotate  ←  exhibit
#                                               ←  media_relation
#              crdt   ←  (archive + annotate)
#              events ←  (common only)
#
# No app may import from a layer above it.

[tool.importlinter]
root_package = "papadapi"
include_external_packages = true

[[tool.importlinter.contracts]]
name = "common is a leaf — legacy upward imports exempted"
type = "forbidden"
source_modules = ["papadapi.common"]
forbidden_modules = [
    # Upward imports (legacy debt — all exempted below, no new violations allowed)
    "papadapi.users",
    "papadapi.archive",
    "papadapi.annotate",
    # Lateral/downstream (no exemptions — must stay clean)
    "papadapi.importexport",
    "papadapi.exhibit",
    "papadapi.media_relation",
    "papadapi.crdt",
    "papadapi.events",
]
# Legacy debt: common.functions/serializers/views cross-import archive, annotate, users.
# Frozen — do not add new violations. Resolve by moving logic to higher-layer apps.
ignore_imports = [
    "papadapi.common.functions -> papadapi.annotate.models",
    "papadapi.common.functions -> papadapi.archive.models",
    "papadapi.common.serializers -> papadapi.annotate.models",
    "papadapi.common.serializers -> papadapi.archive.models",
    "papadapi.common.serializers -> papadapi.users.serializers",
    "papadapi.common.views -> papadapi.annotate.models",
    "papadapi.common.views -> papadapi.archive.models",
    "papadapi.common.views -> papadapi.users.models",
    "papadapi.common.views -> papadapi.users.permissions",
]

[[tool.importlinter.contracts]]
name = "users may not import from apps above it"
type = "forbidden"
source_modules = ["papadapi.users"]
forbidden_modules = [
    "papadapi.archive",
    "papadapi.annotate",
    "papadapi.importexport",
    "papadapi.exhibit",
    "papadapi.media_relation",
    "papadapi.crdt",
    "papadapi.events",
]

[[tool.importlinter.contracts]]
name = "archive may not import from importexport or new apps"
type = "forbidden"
source_modules = ["papadapi.archive"]
forbidden_modules = [
    "papadapi.annotate",
    "papadapi.importexport",
    "papadapi.exhibit",
    "papadapi.media_relation",
    "papadapi.crdt",
    "papadapi.events",
]
# All direct archive→annotate imports cleared in Round 20 via media_copied signal.
# Transitive path archive→common→annotate is frozen debt in common (see common contract
# ignore_imports). Mirror those edges here so this contract's graph evaluation matches.
ignore_imports = [
    "papadapi.common.serializers -> papadapi.annotate.models",
    "papadapi.common.functions -> papadapi.annotate.models",
]

[[tool.importlinter.contracts]]
name = "annotate may only import from common, users, archive"
type = "forbidden"
source_modules = ["papadapi.annotate"]
forbidden_modules = [
    "papadapi.importexport",
    "papadapi.exhibit",
    "papadapi.media_relation",
    "papadapi.crdt",
]

[[tool.importlinter.contracts]]
name = "crdt app may not import from exhibit or media_relation"
type = "forbidden"
source_modules = ["papadapi.crdt"]
forbidden_modules = [
    "papadapi.exhibit",
    "papadapi.media_relation",
    "papadapi.importexport",
]

[[tool.importlinter.contracts]]
name = "events app is a leaf — only imports from common"
type = "forbidden"
source_modules = ["papadapi.events"]
forbidden_modules = [
    "papadapi.archive",
    "papadapi.annotate",
    "papadapi.exhibit",
    "papadapi.media_relation",
    "papadapi.crdt",
    "papadapi.importexport",
]

[[tool.importlinter.contracts]]
name = "media_relation may only import from common, users, archive, annotate"
type = "forbidden"
source_modules = ["papadapi.media_relation"]
forbidden_modules = [
    "papadapi.importexport",
    "papadapi.exhibit",
    "papadapi.crdt",
]

[[tool.importlinter.contracts]]
name = "exhibit may only import from common, users, archive, annotate"
type = "forbidden"
source_modules = ["papadapi.exhibit"]
forbidden_modules = [
    "papadapi.importexport",
    "papadapi.media_relation",
    "papadapi.crdt",
]

[[tool.importlinter.contracts]]
name = "queue utility is a leaf — may not import from any app"
type = "forbidden"
source_modules = ["papadapi.queue"]
forbidden_modules = [
    "papadapi.common",
    "papadapi.users",
    "papadapi.archive",
    "papadapi.annotate",
    "papadapi.importexport",
    "papadapi.exhibit",
    "papadapi.media_relation",
    "papadapi.crdt",
    "papadapi.events",
]

[[tool.importlinter.contracts]]
name = "importexport may only import from common, users, archive, annotate"
type = "forbidden"
source_modules = ["papadapi.importexport"]
forbidden_modules = [
    "papadapi.exhibit",
    "papadapi.media_relation",
    "papadapi.crdt",
    "papadapi.events",
]

# ── bandit ────────────────────────────────────────────────────────────────────

[tool.bandit]
exclude_dirs = ["*/migrations", "*/tests", "conftest.py"]
skips = [
    "B101",  # assert — fine in tests (excluded above)
    "B603",  # subprocess with list args — ffmpeg/ffprobe calls are intentional
    "B607",  # partial path — ffmpeg is expected to be on PATH
]
