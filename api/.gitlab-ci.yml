variables:
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  # Defines the location of the analysis task cache
  VERSION: "3.0"
  GIT_DEPTH: "0"  # Tells git to fetch all the branches of the project, required by the analysis task
sonarcloud-check:
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
  only:
    - staging
build:
  image: docker:latest
  stage: build
  only:
    - dev
    - staging
    - prod
  services:
    - docker:dind
  before_script:
    - echo -n "$DOCKERHUB_RW_Token" | docker login -u "$DOCKERHUB_RW_Username"  --password-stdin
  script:
    - |
      if [[ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]]; then
        tag="$VERSION"
        echo "Running on default branch '$CI_DEFAULT_BRANCH': tag = $VERSION"
      else
        tag="$VERSION-$CI_COMMIT_BRANCH"
        echo "Running on branch '$CI_COMMIT_BRANCH': tag = $tag"
      fi
    - docker build  -t "janastu/papad-backend:${tag}" -f Dockerfile .
    - docker push "janastu/papad-backend:${tag}"
